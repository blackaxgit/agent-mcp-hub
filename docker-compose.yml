services:
  agent-mcp-hub:
    build: .
    image: agent-mcp-hub:${APP_VERSION:-latest}
    ports:
      # Loopback-only publish: the /mcp endpoint can spawn coding agents, so
      # never expose it beyond this host without setting MCP_TOKEN and a TLS
      # reverse proxy in front.
      - "127.0.0.1:3919:3919"
    environment:
      PORT: 3919
      # Bind all interfaces inside the container so the published port reaches
      # the server; host exposure is restricted below (127.0.0.1 publish).
      HOST: "0.0.0.0"
      # Required shared-secret auth: POST /mcp requires
      # "Authorization: Bearer <token>". Binding non-loopback without it is
      # refused at startup because the /mcp endpoint can execute code.
      MCP_TOKEN: ${MCP_TOKEN:?set MCP_TOKEN in .env — the /mcp endpoint can execute code}
      # Extra allowed browser Origins (comma-separated); loopback is always allowed.
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      # Comma-separated allowlist of agents to expose (codex,cursor,opencode,claude); empty = all.
      MCP_AGENTS: ${MCP_AGENTS:-}
      # Credential passthrough for the wrapped CLIs (set the ones you use):
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      # Directory the agents operate on (pass cwd: "/workspace" in tool calls)
      - ./workspace:/workspace
      # Alternative to API keys: reuse host CLI logins (read-only)
      # - ~/.codex:/home/mcp/.codex:ro
      # - ~/.local/share/opencode:/home/mcp/.local/share/opencode:ro
    restart: unless-stopped
