# agent-mcp-hub — local container deployment.
#
# AUTH — two separate concerns, don't conflate them:
#  1. The wrapped CLIs (codex/claude/opencode/cursor) authenticate THEMSELVES from
#     their own stored logins — no API key needed (same model as codex-mcp-server).
#     A fresh container is logged out, so the volumes below MOUNT your host login
#     dirs read-only to reuse `codex login` / `claude` / etc. API keys are only a
#     fallback (commented out under environment).
#  2. MCP_TOKEN is NOT a CLI credential — it guards the HTTP /mcp endpoint, which
#     can execute code. The container binds 0.0.0.0 (to be reachable via the
#     published port), so the fail-closed server requires it.
#
# Prefer no token/container at all? Run stdio: `npx -y github:blackaxgit/agent-mcp-hub`
# (the codex-mcp-server model — no HTTP endpoint, no token, CLIs use host logins).
services:
  agent-mcp-hub:
    build:
      context: .
      args:
        # INSTALL_CURSOR=false in .env skips the cursor CLI install — needed
        # behind TLS-intercepting proxies where the vendor installer's download
        # fails, or to opt out of the unpinned vendor install script.
        INSTALL_CURSOR: ${INSTALL_CURSOR:-true}
    image: agent-mcp-hub:${APP_VERSION:-latest}
    ports:
      # Loopback-only publish: the /mcp endpoint can spawn coding agents, so
      # never expose it beyond this host without MCP_TOKEN and a TLS proxy.
      - "127.0.0.1:3919:3919"
    environment:
      PORT: 3919
      # Bind all interfaces inside the container so the published port reaches
      # the server; host exposure is restricted above (127.0.0.1 publish).
      HOST: "0.0.0.0"
      # Guards the HTTP /mcp endpoint (NOT a CLI key). Binding non-loopback
      # without it is refused at startup because /mcp can execute code.
      MCP_TOKEN: ${MCP_TOKEN:?set MCP_TOKEN in .env — the /mcp endpoint can execute code}
      # Comma-separated allowlist of agents to expose (codex,cursor,opencode,claude); empty = all.
      MCP_AGENTS: ${MCP_AGENTS:-}
      # Extra allowed browser Origins (comma-separated); loopback is always allowed.
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      # Auth per CLI (verified by live container test):
      #  - codex, opencode: authenticated via the login mounts below — no key.
      #  - claude: macOS keeps its OAuth token in the Keychain (NOT ~/.claude), so
      #    set ANTHROPIC_API_KEY. (On Linux, ~/.claude/.credentials.json + the mount work.)
      #  - cursor: its binary+login live together in ~/.local/share/cursor-agent, and
      #    mounting that would clobber the image's cursor-agent — so use CURSOR_API_KEY
      #    (or run `cursor-agent login` inside the container once).
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      # Use the container-side opencode config. The host config points mlx-local at
      # 127.0.0.1:8080, which inside the container resolves to the container itself —
      # opencode then hangs until the MCP call times out. See container/opencode.jsonc.
      OPENCODE_CONFIG: /etc/agent-hub/opencode.jsonc
    volumes:
      # Directory the agents operate on (pass cwd: "/workspace" in tool calls).
      - ./workspace:/workspace
      # Reuse your HOST CLI logins (read-only) so codex/opencode need no API key.
      # Container runs as user "mcp" (HOME=/home/mcp). CAVEATS:
      #  - Comment out any CLI you don't use: a MISSING source dir is silently
      #    auto-created EMPTY (short bind-mount syntax), so that CLI acts logged-out.
      #  - claude/macOS: token is Keychain-backed, so this ~/.claude mount carries
      #    config but NOT the login — use ANTHROPIC_API_KEY above. (On Linux, claude
      #    stores ~/.claude/.credentials.json and the mount works.)
      #  - cursor is intentionally NOT mounted: ~/.local/share/cursor-agent holds the
      #    versioned binary and would shadow the image's cursor-agent (dangling
      #    symlink → "not found"). Use CURSOR_API_KEY / in-container `cursor-agent login`.
      #  - Native Linux: host cred files owned by your uid may be unreadable to the
      #    container's uid 1001 (ownership/mode) — then use the API-key fallbacks.
      #    macOS Docker Desktop mediates uids, so mounts read fine there.
      #  - codex >=0.130 and opencode must WRITE into their own dirs (app-server
      #    init / XDG state). Mounting them :ro makes `--version` still exit 0 for
      #    codex while every real run dies with "Read-only file system (os error 30)".
      - ${HOME}/.codex:/home/mcp/.codex
      - ${HOME}/.claude:/home/mcp/.claude:ro
      - ${HOME}/.config/opencode:/home/mcp/.config/opencode
      - ${HOME}/.local/share/opencode:/home/mcp/.local/share/opencode
      #  - XDG_STATE_HOME. Without this, docker auto-creates /home/mcp/.local as
      #    root while setting up the nested share/opencode mount, so uid 1001 gets
      #    EACCES on `mkdir /home/mcp/.local/state`.
      - ${HOME}/.local/state:/home/mcp/.local/state
      # Container-side opencode config (baseURL -> host.docker.internal). Selected
      # via OPENCODE_CONFIG above so the host's own config stays untouched.
      - ./container/opencode.jsonc:/etc/agent-hub/opencode.jsonc:ro
    # Docker Desktop provides host.docker.internal automatically; this makes the
    # same name resolve on native Linux, where opencode must reach the host's mlx-lm.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # tini init + healthcheck are baked into the image.
