name: Publish

on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  npm:
    # npm OIDC trusted publishing is NOT supported on self-hosted runners.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # npm provenance + OIDC trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      # --no-provenance: the repo is private, and npm provenance requires a
      # public source repo. OIDC trusted publishing still provides auth. Drop
      # this flag (and restore publishConfig.provenance) if the repo goes public.
      - run: npm publish --no-provenance

  registry:
    needs: npm
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    continue-on-error: true # MCP Registry is preview/discovery, not the install path
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Pin the version and verify a SHA-256 checksum (fail-closed) instead of
      # piping `releases/latest` straight into execution — the same supply-chain
      # discipline the `secrets` job uses for the gitleaks binary. Bumping the
      # version requires updating MCP_PUBLISHER_SHA256 from that release's
      # registry_<version>_checksums.txt, or this step (correctly) fails.
      - name: Install mcp-publisher (pinned + checksum-verified)
        env:
          MCP_PUBLISHER_VERSION: "1.8.0"
          MCP_PUBLISHER_SHA256: "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf"
        run: |
          curl -sSfL "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
      - run: ./mcp-publisher login github-oidc
      - run: ./mcp-publisher publish
