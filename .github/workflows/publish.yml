name: Publish

on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  npm:
    # npm OIDC trusted publishing is NOT supported on self-hosted runners.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # npm provenance + OIDC trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      # --no-provenance: the repo is private, and npm provenance requires a
      # public source repo. OIDC trusted publishing still provides auth. Drop
      # this flag (and restore publishConfig.provenance) if the repo goes public.
      - run: npm publish --no-provenance

  registry:
    needs: npm
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    continue-on-error: true # MCP Registry is preview/discovery, not the install path
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - run: ./mcp-publisher login github-oidc
      - run: ./mcp-publisher publish
