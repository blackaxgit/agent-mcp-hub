name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Secret scanning is paid-only on private personal repos, so CI runs the
      # same gitleaks scan as the local pre-push gate. The gitleaks-action
      # downloads to a fixed /tmp path that collides on self-hosted runners, so
      # fetch the pinned binary into a unique dir and run it directly (no docker,
      # no action).
      - name: gitleaks
        run: |
          dir="$(mktemp -d)"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C "$dir" gitleaks
          "$dir/gitleaks" git . --no-banner --redact

  test:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
