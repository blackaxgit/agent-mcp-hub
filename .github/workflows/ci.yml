name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Secret scanning is paid-only on private personal repos, so CI runs the
      # same gitleaks scan as the local pre-push gate (rootless Docker).
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 detect --source /repo --no-banner

  test:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  docker:
    # Main-push only: the 20G host cannot absorb an uncached multi-GB build
    # per PR (divergent lockfiles defeat layer caching and the disk filled
    # twice, killing jobs mid-build). PRs are covered by secrets+test.
    if: github.event_name == 'push'
    needs: test
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Reclaim ALL docker disk before building — cache hit rate across
      # main pushes is low and headroom matters more than cache on this host.
      - run: docker system prune -af
      # Builds against the runner's ROOTLESS Docker daemon (DOCKER_HOST is set
      # in the runner's .env), keeping ghrunner unprivileged per the runner
      # security rules. INSTALL_CURSOR=false keeps CI independent of the
      # vendor's curl|bash installer.
      - run: docker build --build-arg INSTALL_CURSOR=false -t agent-mcp-hub:ci .
      - run: docker image ls agent-mcp-hub:ci
      - name: Smoke-test the image
        run: |
          docker run -d --name hub-ci -e HOST=0.0.0.0 -e MCP_TOKEN=ci-smoke-token -p 3919:3919 agent-mcp-hub:ci
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:3919/healthz >/dev/null 2>&1; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "container did not become healthy" >&2
          docker logs hub-ci || true
          exit 1
      - name: Tear down smoke container
        if: always()
        run: docker rm -f hub-ci || true
      - run: docker system prune -af
        if: always()
