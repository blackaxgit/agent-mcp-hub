name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Secret scanning is paid-only on private personal repos, so CI runs the
      # same gitleaks scan as the local pre-push gate. The gitleaks-action
      # downloads to a fixed /tmp path that collides on self-hosted runners, so
      # fetch the pinned binary into a unique dir, VERIFY its checksum, then run
      # it directly (no docker, no action).
      - name: gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          dir="$(mktemp -d)"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "$dir/gitleaks.tar.gz"
          echo "${GITLEAKS_SHA256}  ${dir}/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$dir/gitleaks.tar.gz" -C "$dir" gitleaks
          "$dir/gitleaks" git . --no-banner --redact

  test:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
