name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Secret scanning is paid-only on private personal repos, so CI runs the
      # same gitleaks scan as the local pre-push gate (rootless Docker).
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 detect --source /repo --no-banner

  test:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  docker:
    needs: test
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Builds against the runner's ROOTLESS Docker daemon (DOCKER_HOST is set
      # in the runner's .env), keeping ghrunner unprivileged per the runner
      # security rules. INSTALL_CURSOR=false keeps CI independent of the
      # vendor's curl|bash installer.
      - run: docker build --build-arg INSTALL_CURSOR=false -t agent-mcp-hub:ci .
      - run: docker image ls agent-mcp-hub:ci
      # The host has a 20G disk; unbounded build cache filled it and killed
      # jobs mid-step. Keep layers bounded after every build.
      - run: docker image prune -f && docker builder prune -f --keep-storage 2GB
        if: always()
