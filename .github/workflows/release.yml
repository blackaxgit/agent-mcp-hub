name: Release

# Verify that a GitHub Release tag matches package.json's version before any
# publish step runs. Fails the release on version drift — the pre-release review
# flagged this as the single most common release failure mode.
# workflow_dispatch is included so the check can be test-run manually.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  verify-version:
    runs-on: [self-hosted, linux, x64, ubuntu-2404, "repo:agent-mcp-hub"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Version is single-sourced from package.json. On a release, the tag MUST
      # match it (guards the version-drift the pre-release review flagged).
      # GITHUB_REF_NAME is read as a shell variable (not inlined) to avoid
      # workflow injection via a crafted tag name.
      - name: Resolve and verify version
        id: ver
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Release tag '$GITHUB_REF_NAME' ($TAG) does not match package.json version $VERSION" >&2
              exit 1
            fi
          fi
          echo "Verified version $VERSION matches release tag"
