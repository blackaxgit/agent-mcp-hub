name: Release (manual)

# Manual escape hatch to re-publish the current committed version outside the
# automated release-please flow. Delegates to the reusable publish workflow.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
    secrets: inherit
